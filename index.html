<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Port St Lucie Dentist | Boulevard Dental Associates | Dr. Jensen</title>

<meta name="description" content="Looking for a dentist in Port St. Lucie? Boulevard Dental Associates offers cleanings and cosmetic dentistry. Call (772) 337-1111.">

<link rel="stylesheet" href="/style.css">

</head>
<body>

<header class="header">
    <h1>Boulevard Dental Associates</h1>
    <p>Dr. Jensen | Modern, Comfortable Dental Care</p>
</header>

<nav class="nav">
    <a href="#before-after">Before & After</a>
</nav>

<section id="before-after">
    <h2>Before & After Results</h2>

    <div class="ba-grid">
        <img src="/ba1.jpg" onclick="openModal(0)">
        <img src="/ba2.jpg" onclick="openModal(1)">
        <img src="/ba3.jpg" onclick="openModal(2)">
        <img src="/ba4.jpg" onclick="openModal(3)">
        <img src="/ba5.jpg" onclick="openModal(4)">
        <img src="/ba6.jpg" onclick="openModal(5)">
        <img src="/ba7.jpg" onclick="openModal(6)">
        <img src="/ba8.jpg" onclick="openModal(7)">
    </div>
</section>

<!-- MODAL -->
<div id="imgModal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>

    <div class="img-wrapper">
        <img id="modalImg">
    </div>

    <div class="nav-btn prev" onclick="changeSlide(-1)">❮</div>
    <div class="nav-btn next" onclick="changeSlide(1)">❯</div>
</div>

<script>
const images = [
    "/ba1.jpg","/ba2.jpg","/ba3.jpg","/ba4.jpg",
    "/ba5.jpg","/ba6.jpg","/ba7.jpg","/ba8.jpg"
];

let index = 0;
let scale = 1;
let startDist = 0;
let currentX = 0, currentY = 0;
let startX = 0, startY = 0;

// OPEN
function openModal(i){
    index = i;
    document.getElementById("imgModal").style.display="flex";
    loadImage();
}

// CLOSE
function closeModal(){
    document.getElementById("imgModal").style.display="none";
    resetZoom();
}

// LOAD IMAGE
function loadImage(){
    const img = document.getElementById("modalImg");
    img.style.opacity = 0;
    setTimeout(()=>{
        img.src = images[index];
        img.style.opacity = 1;
        resetZoom();
    },150);
}

// SLIDE
function changeSlide(dir){
    index = (index + dir + images.length) % images.length;
    loadImage();
}

// RESET ZOOM
function resetZoom(){
    scale = 1;
    currentX = 0;
    currentY = 0;
    updateTransform();
}

// APPLY TRANSFORM
function updateTransform(){
    const img = document.getElementById("modalImg");
    img.style.transform = `translate(${currentX}px, ${currentY}px) scale(${scale})`;
}

// TOUCH START
document.getElementById("imgModal").addEventListener("touchstart", e=>{
    if(e.touches.length===2){
        startDist = getDistance(e.touches);
    } else {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
    }
});

// TOUCH MOVE
document.getElementById("imgModal").addEventListener("touchmove", e=>{
    if(e.touches.length===2){
        let newDist = getDistance(e.touches);
        scale *= newDist / startDist;
        scale = Math.min(Math.max(scale,1),3);
        startDist = newDist;
        updateTransform();
    } else if(scale > 1){
        currentX += e.touches[0].clientX - startX;
        currentY += e.touches[0].clientY - startY;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        updateTransform();
    }
});

// SWIPE
document.getElementById("imgModal").addEventListener("touchend", e=>{
    if(scale === 1){
        let dx = startX - (e.changedTouches[0]?.clientX || startX);
        if(dx > 50) changeSlide(1);
        if(dx < -50) changeSlide(-1);
    }
});

// DISTANCE HELPER
function getDistance(touches){
    return Math.hypot(
        touches[0].clientX - touches[1].clientX,
        touches[0].clientY - touches[1].clientY
    );
}

// KEYBOARD
document.addEventListener("keydown", e=>{
    if(document.getElementById("imgModal").style.display==="flex"){
        if(e.key==="ArrowRight") changeSlide(1);
        if(e.key==="ArrowLeft") changeSlide(-1);
        if(e.key==="Escape") closeModal();
    }
});
</script>

</body>
</html>
